# fly.toml app configuration file generated for mux-lang-api on 2026-05-30T20:15:18-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mux-lang-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  COMPILE_TIMEOUT = '30'
  GUNICORN_CMD_ARGS = '--capture-output --log-level info'
  MUX_BIN = 'mux'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 2
