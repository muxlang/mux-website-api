# Non-gating early-warning canary.
#
# The production image runs a DELIBERATELY PINNED, RELEASED `mux` binary
# (see Dockerfile `ARG MUX_VERSION`). That pin is correct and is NOT changed
# here. This workflow is a separate, scheduled, NON-BLOCKING signal that builds
# the compiler from `muxlang/mux-compiler` main and runs this API against it, so
# a compiler-main regression that would break the API contract (request/response
# shape, exit handling, run behavior) is caught early instead of only at the
# next release bump.
#
# It runs ONLY on a nightly schedule and manual dispatch - never on push or
# pull_request - so it can never gate normal CI or deploys. Do not add it as a
# required status check.
name: Canary - compiler main

on:
  schedule:
    # Nightly at 07:00 UTC.
    - cron: "0 7 * * *"
  workflow_dispatch:

# Never run more than one canary at a time; a newer run supersedes an older one.
concurrency:
  group: canary-compiler-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  canary:
    name: API vs compiler main
    runs-on: ubuntu-latest
    # Bound a hung Cargo build / LLVM install well below GitHub's 6h default.
    timeout-minutes: 60
    # This is an informational signal; a red canary must not read as "the API is
    # broken". It flags that compiler main and this API have drifted.
    env:
      # Mirror mux-compiler build.yml so the source build matches upstream CI.
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-22
      LLVM_SYS_221_STRICT_VERSIONING: "1"
      CC: clang-22
      CXX: clang++-22
      # Runtime source for `mux run` (mux resolves MUX_RUNTIME_SRC when no
      # prebuilt runtime lib is available; it builds the runtime on first run).
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
    steps:
      - name: Checkout mux-website-api (this repo)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout mux-compiler main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: muxlang/mux-compiler
          ref: main
          path: mux-compiler

      - name: Checkout mux-runtime main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: muxlang/mux-runtime
          ref: main
          path: mux-runtime

      # Toolchain pinned to match mux-compiler build.yml.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1

      - name: Install LLVM 22 + clang
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates gnupg lsb-release wget
          sudo wget --max-redirect=0 -O /usr/share/keyrings/llvm-snapshot.gpg.key https://apt.llvm.org/llvm-snapshot.gpg.key
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg.key] https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22-dev clang-22 libpolly-22-dev

      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mux-compiler/target
          key: ${{ runner.os }}-canary-cargo-${{ hashFiles('mux-compiler/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-canary-cargo-

      - name: Build mux from compiler main
        working-directory: mux-compiler
        run: cargo build --release -p mux-lang

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        # Only the hash-pinned runtime deps are needed: canary_smoke.py drives
        # the Flask app via its test client and imports nothing dev-only (no
        # pytest), so we keep the repo's require-hashes rule intact and skip the
        # unpinned dev dependencies entirely.
        run: |
          pip install --only-binary :all: --require-hashes -r requirements.lock

      - name: Warm up the runtime build
        # The first `mux run` builds mux-runtime from source into a cache, which
        # can exceed the API's per-request COMPILE_TIMEOUT. Trigger that one-time
        # build directly so the smoke test through the API stays fast.
        env:
          MUX_BIN: ${{ github.workspace }}/mux-compiler/target/release/mux
        run: |
          set -eux
          printf 'auto x = 40 + 2\nprint("warmup:" + x.to_string())\n' > /tmp/warmup.mux
          "$MUX_BIN" run /tmp/warmup.mux

      - name: Smoke test the API against compiler main
        env:
          MUX_BIN: ${{ github.workspace }}/mux-compiler/target/release/mux
          # Generous timeout in case the runtime cache still needs a rebuild.
          COMPILE_TIMEOUT: "180"
        run: python tests/canary_smoke.py
